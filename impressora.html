<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Trabalho na Impressora 3D</title>

  <!-- Fonte chamativa + fonte de texto -->
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Open Sans', sans-serif;
      background-color: #2e7d32;
      color: white;
    }

    .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 40px 60px;
      max-width: 1200px;
      margin: auto;
    }

    .text {
      max-width: 420px;
    }

    .text h1 {
      font-family: 'Bangers', cursive;
      font-size: 42px;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .text p {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 15px;
    }

    .images {
      display: flex;
      align-items: center;
      gap: 16px; /* aumentei o espaço também */
    }

    .left-images {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* IMAGENS AINDA MAIORES */
    .left-images img {
      width: 170px;
      height: 170px;
      object-fit: cover;
      border-radius: 8px;
    }

    .right-image img {
      width: 270px;
      height: 350px;
      object-fit: cover;
      border-radius: 8px;
    }

    @media (max-width: 800px) {
      .container {
        flex-direction: column;
        text-align: center;
      }

      .images {
        margin-top: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="text">
      <h1>Trabalho na Impressora 3D</h1>
      <p>
        Nos primeiros dias de aula, o professor Marcos Mulder deixou nós escolhermos algo
        para imprimir na impressora 3D, para nós entendermos como funcionava a impressora.
      </p>
      <p>
        Eu acabei fazendo um creeper do Minecraft, para o meu irmão,
        porque ele ficou pedindo MUITO.
      </p>
    </div>

    <div class="images">
      <div class="left-images">
        <img src="arthur.jpeg" alt="Foto 1">
        <img src="arthur2.jpeg" alt="Foto 2">
      </div>

      <div class="right-image">
        <img src="creeper.jpg" alt="Creeper Minecraft">
      </div>
    </div>
  </div>

</body>
</html>
